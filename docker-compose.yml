services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    environment:
      - LANG=en
      - WG_HOST=${WG_HOST:?Set WG_HOST to your server public IP or domain}
      - PASSWORD_HASH=${PASSWORD_HASH:?Set PASSWORD_HASH to a bcrypt hash of your password}
      - WG_PORT=${WG_PORT:-51820}
      - PORT=${WG_UI_PORT:-51821}
      - WG_DEFAULT_ADDRESS=${WG_DEFAULT_ADDRESS:-10.8.0.x}
      - WG_DEFAULT_DNS=${WG_DEFAULT_DNS:-1.1.1.1}
      - WG_ALLOWED_IPS=${WG_ALLOWED_IPS:-0.0.0.0/0, ::/0}
      - WG_PERSISTENT_KEEPALIVE=${WG_PERSISTENT_KEEPALIVE:-25}
    volumes:
      - ./wg-data:/etc/wireguard
    ports:
      - "${WG_PORT:-51820}:${WG_PORT:-51820}/udp"
      - "${WG_UI_PORT:-51821}:${WG_UI_PORT:-51821}/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    restart: unless-stopped

  xray:
    image: teddysun/xray:latest
    container_name: xray
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
    ports:
      - "${XRAY_PORT:-443}:443/tcp"
    restart: unless-stopped

  awg:
    build: ./awg
    container_name: awg
    volumes:
      - ./awg-data:/etc/amnezia/amneziawg
    ports:
      - "${AWG_PORT:-51822}:${AWG_PORT:-51822}/udp"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    restart: unless-stopped
