[Interface]
PrivateKey = REPLACE_WITH_SERVER_PRIVATE_KEY
Address = 10.9.0.1/24
ListenPort = 51822

# Amnezia obfuscation parameters. Server and every client MUST use identical
# values here, or the handshake silently fails. Regenerate H1-H4 once per
# deployment (any random uint32, just keep them distinct). Jc/Jmin/Jmax/S1/S2
# defaults below match the AmneziaVPN client's "Default" preset.
Jc = 4
Jmin = 40
Jmax = 70
S1 = 0
S2 = 0
H1 = 982742843
H2 = 1325344849
H3 = 1456789012
H4 = 1567890123

PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -j MASQUERADE
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -j MASQUERADE

# === Clients go below. One [Peer] block per device. ===
# [Peer]
# PublicKey = CLIENT_PUBLIC_KEY
# AllowedIPs = 10.9.0.2/32
