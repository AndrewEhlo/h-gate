[Interface]
PrivateKey = REPLACE_WITH_SERVER_PRIVATE_KEY
Address = 10.9.0.1/24
ListenPort = 51822

# AmneziaWG v2 obfuscation parameters. Server and every client MUST agree on
# every value here; mismatch = silent handshake failure. Regenerate once per
# deployment so two hosts using this template don't share a fingerprint.
#
# H1-H4: ranges of uint32 (lower-upper). Modern AmneziaVPN clients pick a
# random value from the range per packet; the server accepts any value
# inside the configured range. Single values like "982742843" are the
# "legacy" v1 format — AmneziaVPN imports those configs as "AmneziaWG
# Legacy" and disables obfuscation entirely. Always use ranges here.
# Jc/Jmin/Jmax: junk packet count + size range prepended to handshakes.
# S1-S4: padding lengths used by the spoofed-prefix obfuscation.
# I1-I5: optional hex-blob spoof packets (DNS replies etc.). Empty = none.
Jc = 4
Jmin = 40
Jmax = 70
S1 = 100
S2 = 80
S3 = 20
S4 = 10
H1 = 600000000-2100000000
H2 = 2140000000-2145000000
H3 = 2145500000-2146500000
H4 = 2147000000-2147480000

# I1-I5 (optional outbound spoof packets) are NOT included here.
# The amneziawg-tools we build doesn't yet recognize these keys; `awg
# setconf` errors with "Line unrecognized" if present. They're a client-
# side outbound obfuscation feature and the server side works fine without
# them. scripts/awg-add-user.sh emits empty I1-I5 in the client URL so
# AmneziaVPN still classifies the import as full AmneziaWG (v2), not Legacy.

PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -j MASQUERADE
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -j MASQUERADE

# === Clients go below. One [Peer] block per device. ===
# [Peer]
# PublicKey = CLIENT_PUBLIC_KEY
# AllowedIPs = 10.9.0.2/32
